<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Aquarium Dashboard</title>

		<link rel="stylesheet" href="styles.css">
	</head>
	<body>
		<header>
			<h1>Fish Tank Monitor</h1>
		</header>
		<main>
			<div class="card camera-feed">
				<div class="live-badge">
					<img src="assets/icons/radio.svg" alt="">
					LIVE
				</div>
				<img src="assets/tank-camera-placeholder.png" alt="">
			</div>
			<div class="metrics">
				<div class="card">
					<a href="" class="log-button">View Logs</a>
					<p class="label">
						<img src="assets/icons/thermometer.svg" alt="">
						Temperature
					</p>
					<p class="bold"><span id="temp">--</span>°F</p>
					<div class="status-indicator">
						<span id="temp-dot" class="status-dot loading"></span>
						<span id="temp-text" class="status-text">Status: --</span>
					</div>
				</div>
				<div class="card">
					<a href="" class="log-button">View Logs</a>
					<p class="label">
						<img src="assets/icons/droplet.svg" alt="">
						pH Level
					</p>
					<p class="bold"><span id="ph">--</span>
					pH</p>
					<div class="status-indicator">
						<span id="ph-dot" class="status-dot loading"></span>
						<span id="ph-text" class="status-text">Status: --</span>
					</div>
				</div>
				<div class="card">
					<a href="" class="log-button">View Logs</a>
					<p class="label">
						<img src="assets/icons/bubbles.svg" alt="">
						<span>TDS<br><span class="sublabel">Total Dissolved Solids</span></span>
					</p>
					<p class="bold"><span id="tds">--</span>
					ppm</p>
					<div class="status-indicator">
						<span id="tds-dot" class="status-dot loading"></span>
						<span id="tds-text" class="status-text">Status: --</span>
					</div>
				</div>
			</div>
		</main>
		<script src="script.js"></script>
	</body>
</html>
